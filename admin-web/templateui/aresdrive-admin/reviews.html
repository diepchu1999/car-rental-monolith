<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AresDrive — Reviews</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .review-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; margin-bottom: 12px; transition: all var(--transition); }
    .review-card:hover { border-color: var(--border-hover); }
    .review-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .review-stars { color: #F5A623; font-size: 13px; letter-spacing: 1px; }
    .review-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .review-bottom { display: flex; align-items: center; justify-content: space-between; }
    .review-meta { font-size: 11px; color: var(--text-muted); }
    .rating-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .rating-bar label { font-size: 12px; color: var(--text-secondary); width: 40px; }
    .rating-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
    .rating-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.6s ease; }
    .rating-count { font-size: 11px; color: var(--text-muted); width: 30px; text-align: right; }
  </style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div id="header-root"></div>
  <div class="content">
    <div class="page-header">
      <div class="page-header-left"><h2>Đánh giá</h2><p>Quản lý reviews từ khách hàng và chủ xe</p></div>
    </div>

    <div style="display:grid;grid-template-columns:300px 1fr;gap:24px">
      <!-- Rating Summary -->
      <div>
        <div class="card animate-fade-up" style="padding:24px">
          <div style="text-align:center;margin-bottom:20px">
            <div style="font-family:var(--font-display);font-size:48px;font-weight:700;color:var(--accent)">4.7</div>
            <div class="review-stars" style="font-size:18px;margin:4px 0">★★★★★</div>
            <div style="font-size:12px;color:var(--text-muted)">2,847 đánh giá</div>
          </div>
          <div>
            <div class="rating-bar"><label>5 ★</label><div class="rating-track"><div class="rating-fill" style="width:68%"></div></div><span class="rating-count">1,936</span></div>
            <div class="rating-bar"><label>4 ★</label><div class="rating-track"><div class="rating-fill" style="width:21%"></div></div><span class="rating-count">598</span></div>
            <div class="rating-bar"><label>3 ★</label><div class="rating-track"><div class="rating-fill" style="width:7%"></div></div><span class="rating-count">199</span></div>
            <div class="rating-bar"><label>2 ★</label><div class="rating-track"><div class="rating-fill" style="width:3%"></div></div><span class="rating-count">85</span></div>
            <div class="rating-bar"><label>1 ★</label><div class="rating-track"><div class="rating-fill" style="width:1%"></div></div><span class="rating-count">29</span></div>
          </div>
        </div>
      </div>

      <!-- Reviews List -->
      <div>
        <div class="flex gap-8 mb-16">
          <button class="pill-btn active">Mới nhất</button>
          <button class="pill-btn">Cao nhất</button>
          <button class="pill-btn">Thấp nhất</button>
          <button class="pill-btn">Chờ duyệt</button>
        </div>
        <div id="reviews-list"></div>
      </div>
    </div>
  </div>
</main>
<script src="js/components.js"></script>
<script>
document.getElementById('sidebar-root').innerHTML = renderSidebar('reviews');
document.getElementById('header-root').innerHTML = renderHeader('Reviews', 'Đánh giá & phản hồi');

const reviews = [
  { customer:'Trần Hưng', init:'TH', col:'var(--info)', car:'Toyota Camry 2024', rating:5, text:'Xe rất mới và sạch sẽ. Chủ xe hỗ trợ nhiệt tình, giao xe đúng giờ. Chắc chắn sẽ thuê lại!', date:'08/04/2026', type:'renter', status:'approved' },
  { customer:'Phạm Duy', init:'PD', col:'var(--accent)', car:'Mercedes S450 2024', rating:5, text:'Tài xế rất chuyên nghiệp, đúng giờ. Xe sang trọng, đúng như mô tả. Dịch vụ 5 sao!', date:'08/04/2026', type:'renter', status:'approved' },
  { customer:'Nguyễn An', init:'NA', col:'var(--danger)', car:'VinFast VF8 2024', rating:4, text:'Xe ổn, chạy êm. Tuy nhiên pin xe chỉ còn 85% nên không đi được xa lắm. Cần cải thiện.', date:'06/04/2026', type:'renter', status:'approved' },
  { customer:'Lê Thảo', init:'LT', col:'var(--info)', car:'Hyundai Tucson 2023', rating:2, text:'Xe có vài vết trầy mà không được thông báo trước. Hơi thất vọng.', date:'05/04/2026', type:'renter', status:'pending' },
  { customer:'Hoàng Nam', init:'HN', col:'var(--warning)', car:'Mazda CX-5 2024', rating:5, text:'Lần thứ 3 thuê xe ở đây, lần nào cũng hài lòng. Giá cả hợp lý, xe chất lượng.', date:'04/04/2026', type:'renter', status:'approved' },
  { customer:'Mai Linh (Host)', init:'ML', col:'var(--success)', car:'Honda CR-V 2023', rating:4, text:'Khách thuê giữ xe cẩn thận, trả đúng giờ. Chỉ có điều bên trong hơi bẩn khi trả.', date:'03/04/2026', type:'host', status:'approved' },
];

const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);

document.getElementById('reviews-list').innerHTML = reviews.map((r,i) => `
  <div class="review-card animate-fade-up" style="animation-delay:${i*0.04}s">
    <div class="review-top">
      <div class="avatar avatar-md" style="background:${r.col}15;color:${r.col}">${r.init}</div>
      <div style="flex:1">
        <div class="flex items-center justify-between">
          <div>
            <div style="font-weight:500">${r.customer}</div>
            <div style="font-size:11px;color:var(--text-muted)">${r.car}</div>
          </div>
          <div class="flex items-center gap-8">
            ${r.status==='pending'?'<span class="badge badge-pending">Chờ duyệt</span>':''}
            <span class="tag ${r.type==='renter'?'tag-p2p':'tag-self'}">${r.type==='renter'?'Người thuê':'Chủ xe'}</span>
          </div>
        </div>
        <div class="review-stars" style="margin-top:6px">${stars(r.rating)}</div>
      </div>
    </div>
    <div class="review-text">${r.text}</div>
    <div class="review-bottom">
      <span class="review-meta">${r.date}</span>
      <div class="flex gap-8">
        ${r.status==='pending'?`<button class="btn btn-sm" style="background:var(--success-dim);color:var(--success);border:1px solid rgba(62,207,142,0.2)" onclick="this.closest('.review-card').querySelector('.badge')?.remove();showToast('Đã duyệt review')">Duyệt</button><button class="btn btn-danger btn-sm" onclick="showToast('Đã từ chối review','error')">Từ chối</button>`:'<button class="btn btn-secondary btn-sm">Phản hồi</button>'}
      </div>
    </div>
  </div>`).join('');
</script>
</body>
</html>

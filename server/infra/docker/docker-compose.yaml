name: car-rental-local

services:
  postgres:
    image: postgres:16-alpine
    container_name: car-rental-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-car_rental}
      POSTGRES_USER: ${POSTGRES_USER:-car_rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-car_rental_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - car-rental-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: car-rental-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@aresdrive.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - car-rental-net

volumes:
  postgres-data:
  pgadmin-data:

networks:
  car-rental-net:
    driver: bridge

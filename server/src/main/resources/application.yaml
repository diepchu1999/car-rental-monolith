spring:
  application:
    name: car-rental-monolith

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: ${DB_URL:jdbc:p6spy:postgresql://localhost:5432/car_rental}
    username: ${DB_USERNAME:car_rental}
    password: ${DB_PASSWORD:car_rental_dev_password}
    driver-class-name: ${DB_DRIVER:com.p6spy.engine.spy.P6SpyDriver}
    hikari:
      pool-name: CarRentalHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      auto-commit: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    # baseline ở 110: migration <=110 (schema cũ) được coi như đã áp, Flyway chỉ
    # chạy V120 trở đi. Trên DB rỗng mới, public trống nên baseline bị bỏ qua và
    # Flyway chạy đầy đủ từ V001. Lưu ý: DB được khôi phục từ dump (bảng cũ nằm ở
    # schema theo module, public trống) cần baseline thủ công 1 lần — xem
    # docs/DB_BASELINE.md.
    baseline-on-migrate: true
    baseline-version: 110

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: false
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true
        connection:
          provider_disables_autocommit: true

app:
  media:
    vehicle-images-dir: ${MEDIA_VEHICLE_IMAGES_DIR:./uploads/vehicle-images}

logging:
  level:
    p6spy: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

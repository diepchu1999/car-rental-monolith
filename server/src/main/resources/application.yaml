spring:
  application:
    name: car-rental-monolith

  datasource:
    url: ${DB_URL:jdbc:p6spy:postgresql://localhost:5432/car_rental}
    username: ${DB_USERNAME:car_rental}
    password: ${DB_PASSWORD:car_rental_dev_password}
    driver-class-name: ${DB_DRIVER:com.p6spy.engine.spy.P6SpyDriver}
    hikari:
      pool-name: CarRentalHikariCP
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
      auto-commit: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: false
        jdbc:
          batch_size: 50
          time_zone: UTC
        order_inserts: true
        order_updates: true
        query:
          in_clause_parameter_padding: true
          fail_on_pagination_over_collection_fetch: true
        connection:
          provider_disables_autocommit: true

logging:
  level:
    p6spy: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

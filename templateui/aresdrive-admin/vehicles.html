<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AresDrive — Vehicles</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .vehicles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .vehicle-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; transition: all var(--transition); cursor: pointer;
    }
    .vehicle-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .vehicle-img {
      height: 160px; background: var(--bg-secondary); display: flex;
      align-items: center; justify-content: center; position: relative;
    }
    .vehicle-img svg { width: 80px; height: 60px; opacity: 0.15; }
    .vehicle-source {
      position: absolute; top: 10px; left: 10px;
      padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
    }
    .vehicle-status-dot {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 500;
    }
    .vehicle-info { padding: 16px; }
    .vehicle-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .vehicle-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 12px; }
    .vehicle-stats { display: flex; gap: 16px; padding-top: 12px; border-top: 1px solid var(--border); }
    .vehicle-stat { display: flex; flex-direction: column; }
    .vehicle-stat span:first-child { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .vehicle-stat span:last-child { font-family: var(--font-display); font-size: 15px; font-weight: 600; color: var(--text-primary); margin-top: 2px; }
  </style>
</head>
<body>
<div id="sidebar-root"></div>
<main class="main">
  <div id="header-root"></div>
  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <h2>Quản lý Xe</h2>
        <p>342 xe đang hoạt động trên hệ thống</p>
      </div>
      <div class="flex gap-8">
        <button class="btn btn-secondary btn-sm" id="btn-grid" onclick="setView('grid')" style="background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent)">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="currentColor"/><rect x="8" y="1" width="5" height="5" rx="1" fill="currentColor"/><rect x="1" y="8" width="5" height="5" rx="1" fill="currentColor"/><rect x="8" y="8" width="5" height="5" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="btn btn-secondary btn-sm" id="btn-list" onclick="setView('list')">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="2.5" rx="1" fill="currentColor"/><rect x="1" y="6" width="12" height="2.5" rx="1" fill="currentColor"/><rect x="1" y="10" width="12" height="2.5" rx="1" fill="currentColor"/></svg>
        </button>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-vehicle')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Thêm xe
        </button>
      </div>
    </div>

    <!-- Filters -->
    <div class="card mb-24 animate-fade-up">
      <div style="padding:16px 24px;display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        <div class="search-box" style="width:220px">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="#555860" stroke-width="1.3"/><path d="M11 11L14 14" stroke="#555860" stroke-width="1.3" stroke-linecap="round"/></svg>
          <input type="text" placeholder="Tìm xe, biển số..." id="vehicle-search" oninput="filterVehicles()">
        </div>
        <select class="form-select" style="width:140px;padding:8px 12px" id="vehicle-source" onchange="filterVehicles()">
          <option value="">Tất cả nguồn</option>
          <option value="owned">AresDrive</option>
          <option value="p2p">P2P</option>
        </select>
        <select class="form-select" style="width:140px;padding:8px 12px" id="vehicle-status" onchange="filterVehicles()">
          <option value="">Tất cả TT</option>
          <option value="available">Sẵn sàng</option>
          <option value="rented">Đang thuê</option>
          <option value="maintenance">Bảo trì</option>
        </select>
      </div>
    </div>

    <div id="vehicles-container" class="vehicles-grid"></div>
  </div>
</main>

<!-- Modal: Add Vehicle -->
<div class="modal-overlay" id="modal-add-vehicle" onclick="if(event.target===this)closeModal('modal-add-vehicle')">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 class="modal-title">Thêm xe mới</h3>
      <button class="modal-close" onclick="closeModal('modal-add-vehicle')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Tên xe</label><input class="form-input" placeholder="VD: Toyota Camry 2024"></div>
        <div class="form-group"><label class="form-label">Biển số</label><input class="form-input" placeholder="VD: 51A-888.99"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label class="form-label">Hãng xe</label><select class="form-select"><option>Toyota</option><option>Honda</option><option>Mercedes</option><option>VinFast</option><option>Hyundai</option><option>Mazda</option><option>KIA</option></select></div>
        <div class="form-group"><label class="form-label">Năm SX</label><input class="form-input" type="number" value="2024"></div>
        <div class="form-group"><label class="form-label">Số chỗ</label><select class="form-select"><option>4</option><option>5</option><option>7</option><option>9</option><option>16</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Nguồn</label><select class="form-select"><option>AresDrive (Xe công ty)</option><option>P2P (Xe chủ khác)</option></select></div>
        <div class="form-group"><label class="form-label">Giá thuê/ngày</label><input class="form-input" type="number" placeholder="VD: 800000"></div>
      </div>
      <div class="form-group"><label class="form-label">Mô tả</label><textarea class="form-textarea" placeholder="Mô tả xe, tình trạng, trang bị..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-add-vehicle')">Hủy</button>
      <button class="btn btn-primary" onclick="closeModal('modal-add-vehicle');showToast('Thêm xe thành công!')">Thêm xe</button>
    </div>
  </div>
</div>

<script src="js/components.js"></script>
<script>
document.getElementById('sidebar-root').innerHTML = renderSidebar('vehicles');
document.getElementById('header-root').innerHTML = renderHeader('Vehicles', 'Quản lý đội xe');

const vehicles = [
  { name:'Toyota Camry 2024', plate:'51A-888.99', brand:'Toyota', seats:5, source:'owned', status:'rented', price:800000, trips:47, rating:4.8 },
  { name:'Honda CR-V 2023', plate:'59C-321.45', brand:'Honda', seats:7, source:'p2p', status:'available', price:900000, trips:32, rating:4.6 },
  { name:'Mercedes S450 2024', plate:'51H-001.23', brand:'Mercedes', seats:5, source:'owned', status:'rented', price:2500000, trips:18, rating:4.9 },
  { name:'VinFast VF8 2024', plate:'51K-567.89', brand:'VinFast', seats:5, source:'owned', status:'available', price:750000, trips:55, rating:4.5 },
  { name:'Hyundai Tucson 2023', plate:'51G-234.56', brand:'Hyundai', seats:5, source:'p2p', status:'maintenance', price:700000, trips:28, rating:4.3 },
  { name:'Mazda CX-5 2024', plate:'51F-111.22', brand:'Mazda', seats:5, source:'owned', status:'available', price:850000, trips:41, rating:4.7 },
  { name:'KIA Sorento 2023', plate:'59D-444.55', brand:'KIA', seats:7, source:'p2p', status:'available', price:950000, trips:22, rating:4.4 },
  { name:'Toyota Fortuner 2024', plate:'51B-777.88', brand:'Toyota', seats:7, source:'owned', status:'rented', price:1200000, trips:36, rating:4.8 },
  { name:'Honda City 2023', plate:'51C-222.33', brand:'Honda', seats:5, source:'owned', status:'available', price:600000, trips:63, rating:4.6 },
  { name:'Mitsubishi Xpander 2024', plate:'59E-555.66', brand:'Mitsubishi', seats:7, source:'p2p', status:'available', price:700000, trips:15, rating:4.2 },
  { name:'BMW X3 2024', plate:'51D-999.00', brand:'BMW', seats:5, source:'owned', status:'rented', price:1800000, trips:12, rating:4.9 },
  { name:'Ford Ranger 2023', plate:'51E-333.44', brand:'Ford', seats:5, source:'p2p', status:'available', price:850000, trips:29, rating:4.5 },
];

const statusLabels = { available:'Sẵn sàng', rented:'Đang thuê', maintenance:'Bảo trì' };
const statusClasses = { available:'badge-active', rented:'badge-completed', maintenance:'badge-pending' };
const sourceLabels = { owned:'AresDrive', p2p:'P2P' };
const sourceStyles = { owned:'background:var(--accent-dim);color:var(--accent)', p2p:'background:var(--info-dim);color:var(--info)' };

function renderVehicles(data) {
  document.getElementById('vehicles-container').innerHTML = data.map((v,i) => `
    <div class="vehicle-card animate-fade-up" style="animation-delay:${i*0.03}s">
      <div class="vehicle-img">
        <svg viewBox="0 0 80 60" fill="none"><path d="M10 40V30L20 14H60L70 30V40Z" stroke="currentColor" stroke-width="1.5"/><circle cx="20" cy="40" r="6" stroke="currentColor" stroke-width="1.5"/><circle cx="60" cy="40" r="6" stroke="currentColor" stroke-width="1.5"/><line x1="20" y1="30" x2="60" y2="30" stroke="currentColor" stroke-width="0.8"/></svg>
        <span class="vehicle-source" style="${sourceStyles[v.source]}">${sourceLabels[v.source]}</span>
        <span class="vehicle-status-dot badge ${statusClasses[v.status]}">${statusLabels[v.status]}</span>
      </div>
      <div class="vehicle-info">
        <h4>${v.name}</h4>
        <div class="vehicle-meta">${v.plate} · ${v.seats} chỗ · ${v.brand}</div>
        <div class="vehicle-stats">
          <div class="vehicle-stat"><span>Giá/ngày</span><span style="color:var(--accent)">${formatVND(v.price)}</span></div>
          <div class="vehicle-stat"><span>Chuyến</span><span>${v.trips}</span></div>
          <div class="vehicle-stat"><span>Đánh giá</span><span>⭐ ${v.rating}</span></div>
        </div>
      </div>
    </div>`).join('');
}

function filterVehicles() {
  const search = document.getElementById('vehicle-search').value.toLowerCase();
  const source = document.getElementById('vehicle-source').value;
  const status = document.getElementById('vehicle-status').value;
  const filtered = vehicles.filter(v => {
    if (search && !v.name.toLowerCase().includes(search) && !v.plate.toLowerCase().includes(search)) return false;
    if (source && v.source !== source) return false;
    if (status && v.status !== status) return false;
    return true;
  });
  renderVehicles(filtered);
}

function setView(mode) {
  const container = document.getElementById('vehicles-container');
  const btnGrid = document.getElementById('btn-grid');
  const btnList = document.getElementById('btn-list');
  if (mode === 'grid') {
    container.style.gridTemplateColumns = 'repeat(auto-fill, minmax(280px, 1fr))';
    btnGrid.style.cssText = 'background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent)';
    btnList.style.cssText = '';
  } else {
    container.style.gridTemplateColumns = '1fr';
    btnList.style.cssText = 'background:var(--accent-dim);border-color:var(--border-accent);color:var(--accent)';
    btnGrid.style.cssText = '';
  }
}

renderVehicles(vehicles);
</script>
</body>
</html>
